
		monitor=,preferred,auto,1

env=LIBVA_DRIVER_NAME,nvidia
env=XDG_SESSION_TYPE,wayland
env=GBM_BACKEND,nvidia-drm
env=__GLX_VENDOR_LIBRARY_NAME,nvidia
env=NVD_BACKEND,direct

exec-once=waybar
exec-once=hyprpaper
exec-once=kwalletd6
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store

input {
    kb_layout=ch
    kb_variant=fr
    follow_mouse=1
    touchpad {
        natural_scroll=yes
    }
}

general {
    gaps_in=5
    gaps_out=15
    border_size=2
    col.active_border=rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border=rgba(595959aa)
    layout=dwindle
}

decoration {
    rounding=10
    blur {
        enabled=true
        size=3
        passes=1
    }
}

animations {
    enabled=yes
    bezier=myBezier, 0.05, 0.9, 0.1, 1.05
    animation=windows, 1, 7, myBezier
    animation=windowsOut, 1, 7, default, popin 80%
    animation=fade, 1, 7, default
    animation=workspaces, 1, 6, default
}

$mainMod=SUPER

# Applications
bind=$mainMod, Return, exec, kitty
bind=$mainMod, E, exec, dolphin
bind=$mainMod, R, exec, wofi --show drun
bind=$mainMod, L, exec, hyprlock
bind=$mainMod, C, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Window management
bind=$mainMod, Q, killactive
bind=$mainMod, M, exit
bind=$mainMod, V, togglefloating
bind=$mainMod, F, fullscreen
bind=$mainMod, J, togglesplit
bind=$mainMod, P, pin

# Focus
bind=$mainMod, left, movefocus, l
bind=$mainMod, right, movefocus, r
bind=$mainMod, up, movefocus, u
bind=$mainMod, down, movefocus, d

# Move windows
bind=$mainMod SHIFT, left, movewindow, l
bind=$mainMod SHIFT, right, movewindow, r
bind=$mainMod SHIFT, up, movewindow, u
bind=$mainMod SHIFT, down, movewindow, d

# Swap windows
bind=$mainMod CTRL, left, swapwindow, l
bind=$mainMod CTRL, right, swapwindow, r
bind=$mainMod CTRL, up, swapwindow, u
bind=$mainMod CTRL, down, swapwindow, d

# Resize
bind=$mainMod ALT, right, resizeactive, 50 0
bind=$mainMod ALT, left, resizeactive, -50 0
bind=$mainMod ALT, up, resizeactive, 0 -50
bind=$mainMod ALT, down, resizeactive, 0 50

# Workspaces
bind=$mainMod, 1, workspace, 1
bind=$mainMod, 2, workspace, 2
bind=$mainMod, 3, workspace, 3
bind=$mainMod, 4, workspace, 4
bind=$mainMod, 5, workspace, 5

# Move window to workspace
bind=$mainMod SHIFT, 1, movetoworkspace, 1
bind=$mainMod SHIFT, 2, movetoworkspace, 2
bind=$mainMod SHIFT, 3, movetoworkspace, 3
bind=$mainMod SHIFT, 4, movetoworkspace, 4
bind=$mainMod SHIFT, 5, movetoworkspace, 5

# Screenshots
bind=, Print, exec, grimblast save screen ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind=SHIFT, Print, exec, grimblast save area ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind=$mainMod, Print, exec, grimblast save active ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot saved!"

# Mouse
bindm=$mainMod, mouse:272, movewindow
bindm=$mainMod, mouse:273, resizewindow
